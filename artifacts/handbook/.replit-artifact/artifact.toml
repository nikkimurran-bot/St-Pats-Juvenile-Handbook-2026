kind = "web"
previewPath = "/"
title = "St Pats Juvenile Handbook 2026"
version = "1.0.0"
id = "artifacts/handbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18846

[services.development]
run = "pnpm --filter @workspace/handbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/handbook", "run", "build" ]
publicDir = "artifacts/handbook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18846"
BASE_PATH = "/"
