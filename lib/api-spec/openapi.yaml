openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Handbook search
paths:
  /search:
    get:
      operationId: searchHandbook
      tags: [search]
      summary: Search handbook content
      description: Full-text search across all handbook sections and subsections
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (minimum 2 characters)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SearchResult:
      type: object
      properties:
        sectionId:
          type: string
        sectionNumber:
          type: string
        sectionTitle:
          type: string
        subsectionId:
          type: string
        subsectionNumber:
          type: string
        subsectionTitle:
          type: string
        excerpt:
          type: string
      required:
        - sectionId
        - sectionNumber
        - sectionTitle
        - subsectionId
        - subsectionNumber
        - subsectionTitle
        - excerpt
    SearchResponse:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
      required:
        - query
        - results

